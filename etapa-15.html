<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etapa 15 - Diário de Bordo</title>
    <link rel="stylesheet" href="shared-styles.css">
    <link rel="stylesheet" href="extra-styles.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div>
                <div class="stage-info">Etapa 15 de 17</div>
                <div id="protocoloHeaderTag"></div>
                <div class="stage-title">📔 Diário de Bordo</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="goToList()">← Painel de Etapas</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="progress-bar-card">
            <div class="progress-info">
                <span class="progress-label">Progresso da Investigação</span>
                <span class="progress-percent">Etapa 15 de 17 (88%)</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:88%"></div></div>
        </div>

        <div class="form-card">
            <div class="form-card-header">
                <h2>📝 Registro de Reuniões e Decisões</h2>
                <p>Documente cada reunião, discussão ou ponto de decisão relevante ao longo da investigação, mantendo um histórico auditável.</p>
            </div>

            <div class="alert" id="alert"></div>

            <form id="stageForm">
                <div class="form-section">
                    <div id="entriesContainer"></div>
                    <button type="button" class="btn-add-row" id="btnAddEntry">+ Adicionar Entrada no Diário</button>
                </div>

                <div class="form-actions">
                    <div>
                        <button type="submit" class="btn-save">💾 Salvar Etapa</button>
                        <button type="button" class="btn-back-list" onclick="goToList()">Voltar ao Painel</button>
                    </div>
                    <div class="nav-stage-buttons" id="stageNav"></div>
                </div>
            </form>
        </div>
    </div>

    <script src="shared-components.js"></script>
    <style>
        .diario-entry { background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: 10px; padding: 20px; margin-bottom: 16px; position: relative; }
        .diario-entry .btn-remove-entry { position: absolute; top: 14px; right: 14px; }
        .entry-number { font-size: 12px; font-weight: 700; color: var(--color-primary); text-transform: uppercase; margin-bottom: 14px; letter-spacing: 0.5px; }
        .participantes-mini-tags { margin-top: 4px; }
    </style>
    <script>
        const STAGE_NUM = 15;
        let entries = [];
        let tagsInputs = {};

        function renderEntries() {
            const container = document.getElementById('entriesContainer');
            tagsInputs = {};

            if (entries.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhuma entrada registrada. Clique em "+ Adicionar Entrada no Diário".</div>';
                return;
            }

            let html = '';
            entries.forEach((entry, idx) => {
                html += `
                <div class="diario-entry">
                    <button type="button" class="btn-icon delete btn-remove-entry" data-idx="${idx}" title="Remover entrada">🗑️</button>
                    <div class="entry-number">Entrada ${idx + 1}</div>
                    <div class="form-row cols-2">
                        <div class="form-group">
                            <label>Data</label>
                            <input type="date" data-idx="${idx}" data-field="data" value="${escapeHtml(entry.data)}">
                        </div>
                        <div class="form-group">
                            <label>Participantes</label>
                            <div id="participantesTags-${idx}"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Assunto</label>
                            <input type="text" data-idx="${idx}" data-field="assunto" value="${escapeHtml(entry.assunto)}" placeholder="Tema discutido">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Decisões Tomadas</label>
                            <textarea data-idx="${idx}" data-field="decisoes" placeholder="Decisões registradas">${escapeHtml(entry.decisoes)}</textarea>
                        </div>
                    </div>
                    <div class="form-row cols-2">
                        <div class="form-group">
                            <label>Pendências</label>
                            <textarea data-idx="${idx}" data-field="pendencias" placeholder="Itens pendentes">${escapeHtml(entry.pendencias)}</textarea>
                        </div>
                        <div class="form-group">
                            <label>Próximos Passos</label>
                            <textarea data-idx="${idx}" data-field="proximos_passos" placeholder="O que será feito a seguir">${escapeHtml(entry.proximos_passos)}</textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Anotações Livres</label>
                            <textarea data-idx="${idx}" data-field="anotacoes" placeholder="Observações gerais">${escapeHtml(entry.anotacoes)}</textarea>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;

            entries.forEach((entry, idx) => {
                tagsInputs[idx] = new TagsInput(`participantesTags-${idx}`, entry.participantes || []);
            });

            container.querySelectorAll('input, textarea').forEach(el => {
                el.addEventListener('input', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    const field = e.target.dataset.field;
                    entries[idx][field] = e.target.value;
                });
            });

            container.querySelectorAll('.btn-remove-entry').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    entries.splice(idx, 1);
                    renderEntries();
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function loadData() {
            const data = await loadStageData(STAGE_NUM);
            entries = data?.diario_bordo || [];
            renderEntries();
        }

        document.getElementById('btnAddEntry').addEventListener('click', () => {
            entries.push({
                data: '', participantes: [], assunto: '', decisoes: '',
                pendencias: '', proximos_passos: '', anotacoes: ''
            });
            renderEntries();
        });

        document.getElementById('stageForm').addEventListener('submit', (e) => {
            e.preventDefault();

            // Sincronizar participantes de cada tagsInput antes de salvar
            entries.forEach((entry, idx) => {
                if (tagsInputs[idx]) entry.participantes = tagsInputs[idx].getTags();
            });

            saveStageData(STAGE_NUM, { diario_bordo: entries });
            showAlert('✓ Etapa 15 salva com sucesso!', 'success');
        });

        if (!exigirAutenticacao()) { /* guard-stop */ } else {
        renderStageNav(STAGE_NUM);
        renderProtocoloHeader('protocoloHeaderTag');
        loadData();
        }
    </script>
</body>
</html>
