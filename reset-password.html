<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha — Protocolo de Londres</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',Arial,sans-serif; background:linear-gradient(135deg,#1A6B7A,#2DACA4); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .card { background:white; border-radius:16px; padding:40px; width:100%; max-width:420px; box-shadow:0 20px 48px rgba(26,107,122,0.18); }
        .bar { height:4px; background:linear-gradient(90deg,#D4A020 33%,#C0272D 33% 66%,#1A6B7A 66%); border-radius:16px 16px 0 0; margin:-40px -40px 32px; }
        h2 { font-size:24px; font-weight:700; background:linear-gradient(135deg,#1A6B7A,#2DACA4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
        p { font-size:14px; color:#667085; margin-bottom:24px; }
        label { display:block; font-size:11px; font-weight:700; color:#5A5A5A; text-transform:uppercase; letter-spacing:0.7px; margin-bottom:6px; }
        input { width:100%; padding:12px 14px; border:2px solid #e0e6ed; border-radius:10px; font-size:15px; margin-bottom:16px; background:#f8fafb; font-family:inherit; }
        input:focus { outline:none; border-color:#1A6B7A; box-shadow:0 0 0 3px rgba(26,107,122,0.1); }
        .btn { width:100%; padding:13px; background:linear-gradient(135deg,#1A6B7A,#2DACA4); color:white; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
        .alert { padding:12px 14px; border-radius:8px; margin-bottom:16px; font-size:13px; display:none; border-left:4px solid; }
        .alert.show { display:block; }
        .alert.error { background:#fbe9e9; color:#C0272D; border-color:#C0272D; }
        .alert.success { background:#e3f5ee; color:#00875A; border-color:#00875A; }
    </style>
</head>
<body>
<div class="card">
    <div class="bar"></div>
    <h2>Redefinir Senha</h2>
    <p>Digite sua nova senha abaixo.</p>
    <div class="alert" id="alertEl"></div>
    <label>Nova Senha</label>
    <input type="password" id="novaSenha" placeholder="Mínimo 8 caracteres">
    <label>Confirmar Senha</label>
    <input type="password" id="confirmarSenha" placeholder="Repita a nova senha">
    <button class="btn" onclick="redefinirSenha()">Salvar Nova Senha</button>
</div>
<script>
    const alertEl = document.getElementById('alertEl');

    // Pega o token da URL (Supabase envia como hash)
    function getHashParam(key) {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        return params.get(key);
    }

    async function redefinirSenha() {
        const nova = document.getElementById('novaSenha').value;
        const conf = document.getElementById('confirmarSenha').value;

        if (!nova || !conf) { mostrarAlerta('Preencha os dois campos.', 'error'); return; }
        if (nova !== conf) { mostrarAlerta('As senhas não coincidem.', 'error'); return; }
        if (nova.length < 8) { mostrarAlerta('Mínimo 8 caracteres.', 'error'); return; }

        const accessToken = getHashParam('access_token');
        if (!accessToken) {
            mostrarAlerta('Link inválido ou expirado. Solicite um novo.', 'error');
            return;
        }

        try {
            const res = await fetch('/api/redefinir-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ access_token: accessToken, nova_senha: nova })
            });
            const data = await res.json();
            if (data.sucesso) {
                mostrarAlerta('✅ Senha redefinida com sucesso! Redirecionando...', 'success');
                setTimeout(() => window.location.href = '/', 2000);
            } else {
                mostrarAlerta('Erro: ' + (data.erro || 'Tente novamente'), 'error');
            }
        } catch (err) {
            mostrarAlerta('Erro ao redefinir senha.', 'error');
        }
    }

    function mostrarAlerta(msg, tipo) {
        alertEl.textContent = msg;
        alertEl.className = 'alert ' + tipo + ' show';
    }
</script>
</body>
</html>
