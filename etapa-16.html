<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etapa 16 - Monitoramento</title>
    <link rel="stylesheet" href="shared-styles.css">
    <link rel="stylesheet" href="extra-styles.css">
    <style>
        .monitor-card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 14px;
        }
        .monitor-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .monitor-acao-titulo { font-weight: 700; font-size: 14px; color: var(--color-text-primary); flex: 1; }
        .progress-mini-track { height: 6px; background: var(--color-border); border-radius: 3px; overflow: hidden; margin-top: 8px; }
        .progress-mini-fill { height: 100%; background: var(--color-teal); transition: width 0.3s; }
        .monitor-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--color-text-secondary); margin-top: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div>
                <div class="stage-info">Etapa 16 de 17</div>
                <div id="protocoloHeaderTag"></div>
                <div class="stage-title">📡 Monitoramento das Ações</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="goToList()">← Painel de Etapas</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="progress-bar-card">
            <div class="progress-info">
                <span class="progress-label">Progresso da Investigação</span>
                <span class="progress-percent">Etapa 16 de 17 (94%)</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:94%"></div></div>
        </div>

        <div class="form-card">
            <div class="form-card-header">
                <h2>📈 Acompanhamento de Execução</h2>
                <p>Atualize o percentual de conclusão e o status de cada ação corretiva definida na Etapa 14 (Plano 5W2H).</p>
            </div>

            <div class="alert" id="alert"></div>

            <form id="stageForm">
                <div class="form-section">
                    <div id="monitorContainer"></div>
                </div>

                <div class="form-actions">
                    <div>
                        <button type="submit" class="btn-save">💾 Salvar Etapa</button>
                        <button type="button" class="btn-back-list" onclick="goToList()">Voltar ao Painel</button>
                    </div>
                    <div class="nav-stage-buttons" id="stageNav"></div>
                </div>
            </form>
        </div>
    </div>

    <script src="shared-components.js"></script>
    <script>
        const STAGE_NUM = 16;
        let monitoramentos = [];

        async function renderMonitor() {
            const container = document.getElementById('monitorContainer');
            const acoesData = await loadStageData(14);
            const acoes = acoesData?.acoes_5w2h || [];

            if (acoes.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhuma ação foi cadastrada na Etapa 14 (Plano 5W2H) ainda. Preencha aquela etapa primeiro para acompanhar o monitoramento aqui.</div>';
                return;
            }

            // Sincronizar monitoramentos com as ações existentes
            if (monitoramentos.length !== acoes.length) {
                monitoramentos = acoes.map((acao, idx) => {
                    return monitoramentos[idx] || {
                        status: acao.status || 'aberta',
                        prazo: acao.quando || '',
                        responsavel: acao.quem || '',
                        percentual_conclusao: acao.status === 'concluida' ? 100 : 0,
                        observacoes: ''
                    };
                });
            }

            let html = '';
            acoes.forEach((acao, idx) => {
                const mon = monitoramentos[idx];
                html += `
                <div class="monitor-card">
                    <div class="monitor-header">
                        <div class="monitor-acao-titulo">${idx + 1}. ${escapeHtml(acao.o_que || '(sem descrição)')}</div>
                        <select data-idx="${idx}" data-field="status" style="width:auto;">
                            <option value="aberta" ${mon.status === 'aberta' ? 'selected' : ''}>Aberta</option>
                            <option value="em_progresso" ${mon.status === 'em_progresso' ? 'selected' : ''}>Em Progresso</option>
                            <option value="concluida" ${mon.status === 'concluida' ? 'selected' : ''}>Concluída</option>
                            <option value="cancelada" ${mon.status === 'cancelada' ? 'selected' : ''}>Cancelada</option>
                        </select>
                    </div>
                    <div class="monitor-meta">
                        <span>👤 ${escapeHtml(acao.quem || 'Sem responsável')}</span>
                        <span>📅 Prazo: ${escapeHtml(acao.quando || 'Não definido')}</span>
                    </div>
                    <div class="form-row cols-2" style="margin-top:12px;">
                        <div class="form-group">
                            <label>Percentual de Conclusão (${mon.percentual_conclusao}%)</label>
                            <input type="range" min="0" max="100" step="5" data-idx="${idx}" data-field="percentual_conclusao" value="${mon.percentual_conclusao}">
                            <div class="progress-mini-track"><div class="progress-mini-fill" style="width:${mon.percentual_conclusao}%"></div></div>
                        </div>
                        <div class="form-group">
                            <label>Responsável pelo Acompanhamento</label>
                            <input type="text" data-idx="${idx}" data-field="responsavel" value="${escapeHtml(mon.responsavel)}" placeholder="Nome">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Observações de Acompanhamento</label>
                            <textarea data-idx="${idx}" data-field="observacoes" placeholder="Últimas atualizações sobre esta ação">${escapeHtml(mon.observacoes)}</textarea>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;

            container.querySelectorAll('select, input, textarea').forEach(el => {
                el.addEventListener('input', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    const field = e.target.dataset.field;
                    let value = e.target.value;
                    if (field === 'percentual_conclusao') value = parseInt(value);
                    monitoramentos[idx][field] = value;

                    if (field === 'percentual_conclusao') {
                        const fill = e.target.closest('.form-group').querySelector('.progress-mini-fill');
                        if (fill) fill.style.width = value + '%';
                        const label = e.target.closest('.form-group').querySelector('label');
                        if (label) label.textContent = `Percentual de Conclusão (${value}%)`;
                    }
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function loadData() {
            const data = await loadStageData(STAGE_NUM);
            monitoramentos = data?.monitoramento || [];
            renderMonitor();
        }

        document.getElementById('stageForm').addEventListener('submit', (e) => {
            e.preventDefault();
            monitoramentos.forEach(m => m.ultima_atualizacao = new Date().toISOString());
            saveStageData(STAGE_NUM, { monitoramento: monitoramentos });
            showAlert('✓ Etapa 16 salva com sucesso!', 'success');
        });

        if (!exigirAutenticacao()) { /* guard-stop */ } else {
        renderStageNav(STAGE_NUM);
        renderProtocoloHeader('protocoloHeaderTag');
        loadData();
        }
    </script>
</body>
</html>
