<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Protocolo - Protocolo de Londres</title>
    <link rel="stylesheet" href="shared-styles.css">
    <link rel="stylesheet" href="extra-styles.css">
    <style>
        .etapas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-top: 20px; }

        .etapa-card {
            background: white; border: 1px solid var(--color-border); border-left: 4px solid var(--color-border);
            border-radius: 10px; padding: 18px; cursor: pointer; transition: var(--transition);
        }
        .etapa-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .etapa-card.completa { border-left-color: var(--color-success); }
        .etapa-card.pendente { border-left-color: var(--color-warning); }

        .etapa-card-num {
            width: 28px; height: 28px; border-radius: 50%; background: var(--color-bg-secondary);
            color: var(--color-text-secondary); display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 13px; margin-bottom: 10px;
        }
        .etapa-card.completa .etapa-card-num { background: var(--color-success); color: white; }

        .etapa-card-title { font-size: 14px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 6px; }
        .etapa-card-desc { font-size: 11px; color: var(--color-text-secondary); line-height: 1.4; margin-bottom: 10px; }
        .etapa-card-status { font-size: 11px; font-weight: 600; }
        .etapa-card-status.completa { color: var(--color-success); }
        .etapa-card-status.pendente { color: var(--color-text-tertiary); }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div>
                <div class="stage-info" id="protocoloHeader"></div>
                <div class="stage-title">Novo Protocolo de Investigação</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="goToDashboard()">← Dashboard</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="form-card">
            <p style="font-size:13px; color:var(--color-text-secondary); margin-bottom:20px;">Complete as 17 etapas para finalizar a investigação. O número do protocolo será gerado automaticamente após preencher as Etapas 1 e 2.</p>

            <div class="progress-bar-card" style="margin-bottom:0;">
                <div class="progress-info">
                    <span class="progress-label">Etapas Completas</span>
                    <span class="progress-percent" id="progressText">0/17</span>
                </div>
                <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            </div>

            <div class="etapas-grid" id="etapasGrid"></div>
        </div>
    </div>

    <script src="shared-components.js"></script>
    <script>
        const ETAPA_DESCRICOES = {
            1: 'Informações pessoais, demográficas e clínicas do residente',
            2: 'Data, hora, tipo e classificação do evento adverso',
            3: 'Timeline detalhada com data e hora de cada ação',
            4: 'Depoimentos de envolvidos e testemunhas',
            5: 'Análise automatizada com inteligência artificial',
            6: 'Problemas na Prestação do Cuidado identificados',
            7: 'Identificação de causas raiz e fatores envolvidos',
            8: 'Suporte emocional para profissionais afetados',
            9: 'Comunicação transparente com paciente/família',
            10: 'Análise legal e documentação obrigatória',
            11: 'Gravidade, Urgência e Tendência de cada causa',
            12: 'Priorização de ações corretivas',
            13: 'Análise de causa e efeito visual',
            14: 'Quem, O quê, Quando, Onde, Por quê, Como, Quanto',
            15: 'Registro de todas as ações e decisões tomadas',
            16: 'Acompanhamento das ações implementadas',
            17: 'Geração do relatório completo com todas as informações'
        };

        // Garante que existe um protocolo ativo. Se a URL tiver ?novo=1, força criação de um novo.
        function ensureActiveProtocol() {
            const urlParams = new URLSearchParams(window.location.search);
            const forcarNovo = urlParams.get('novo') === '1';

            let uuid = getProtocoloAtivo();
            if (forcarNovo || !uuid || !getProtocolosMeta()[uuid]) {
                uuid = criarNovoProtocolo();
            }
            return uuid;
        }

        function renderHeader() {
            const meta = getProtocoloMetaAtivo();
            const statusLabels = { rascunho: 'Rascunho', aberto: 'Aberto', em_analise: 'Em Análise', encerrado: 'Encerrado' };
            const numero = meta.numero || 'Número será gerado após Etapas 1 e 2';
            document.getElementById('protocoloHeader').innerHTML =
                `Protocolo: <strong>${numero}</strong> &nbsp;·&nbsp; Status: <strong>${statusLabels[meta.status]}</strong>`;
        }

        function renderEtapas() {
            const grid = document.getElementById('etapasGrid');
            let html = '';
            let completas = 0;

            for (let i = 1; i <= 17; i++) {
                const completa = isStageComplete(i);
                if (completa) completas++;
                html += `
                <div class="etapa-card ${completa ? 'completa' : 'pendente'}" onclick="goToStage(${i})">
                    <div class="etapa-card-num">${completa ? '✓' : i}</div>
                    <div class="etapa-card-title">${STAGE_NAMES[i]}</div>
                    <div class="etapa-card-desc">${ETAPA_DESCRICOES[i]}</div>
                    <div class="etapa-card-status ${completa ? 'completa' : 'pendente'}">${completa ? '✓ Completo' : 'Não iniciado'}</div>
                </div>`;
            }
            grid.innerHTML = html;

            document.getElementById('progressText').textContent = `${completas}/17`;
            document.getElementById('progressFill').style.width = `${Math.round((completas / 17) * 100)}%`;
        }

        ensureActiveProtocol();
        renderHeader();
        renderEtapas();

        // Sincroniza com a API em segundo plano (caso o protocolo tenha sido
        // preenchido em outro dispositivo/navegador, ou direto no banco) e
        // re-renderiza somente se algo novo foi encontrado.
        (async () => {
            const uuid = getProtocoloAtivo();
            if (!uuid) return;
            const algoMudou = await sincronizarProtocoloCompletoComAPI(uuid);
            if (algoMudou) {
                renderHeader();
                renderEtapas();
            }
        })();
    </script>
</body>
</html>
