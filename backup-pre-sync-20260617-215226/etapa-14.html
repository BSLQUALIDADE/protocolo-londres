<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etapa 14 - Plano 5W2H</title>
    <link rel="stylesheet" href="shared-styles.css">
    <link rel="stylesheet" href="extra-styles.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div>
                <div class="stage-info">Etapa 14 de 17</div>
                <div id="protocoloHeaderTag"></div>
                <div class="stage-title">📋 Plano de Ação 5W2H</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="goToList()">← Painel de Etapas</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="progress-bar-card">
            <div class="progress-info">
                <span class="progress-label">Progresso da Investigação</span>
                <span class="progress-percent">Etapa 14 de 17 (82%)</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:82%"></div></div>
        </div>

        <div class="form-card">
            <div class="form-card-header">
                <h2>✅ Definição das Ações Corretivas</h2>
                <p>Para cada ação corretiva identificada, detalhe o quê, por quê, onde, quem, quando, como e quanto custa (5W2H), além de acompanhar status e evidências de execução.</p>
            </div>

            <div class="alert" id="alert"></div>

            <form id="stageForm">
                <div class="form-section">
                    <div id="acoesContainer"></div>
                    <button type="button" class="btn-add-row" id="btnAddAcao">+ Adicionar Ação</button>
                </div>

                <div class="form-actions">
                    <div>
                        <button type="submit" class="btn-save">💾 Salvar Etapa</button>
                        <button type="button" class="btn-back-list" onclick="goToList()">Voltar ao Painel</button>
                    </div>
                    <div class="nav-stage-buttons" id="stageNav"></div>
                </div>
            </form>
        </div>
    </div>

    <script src="shared-components.js"></script>
    <style>
        .acao-card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
        }
        .acao-card .btn-remove-acao { position: absolute; top: 14px; right: 14px; }
        .acao-number { font-size: 12px; font-weight: 700; color: var(--color-primary); text-transform: uppercase; margin-bottom: 14px; letter-spacing: 0.5px; }
    </style>
    <script>
        const STAGE_NUM = 14;
        let acoes = [];

        function renderAcoes() {
            const container = document.getElementById('acoesContainer');
            if (acoes.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhuma ação cadastrada. Clique em "+ Adicionar Ação".</div>';
                return;
            }

            let html = '';
            acoes.forEach((acao, idx) => {
                html += `
                <div class="acao-card">
                    <button type="button" class="btn-icon delete btn-remove-acao" data-idx="${idx}" title="Remover ação">🗑️</button>
                    <div class="acao-number">Ação ${idx + 1}</div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>O Quê (What)</label>
                            <textarea data-idx="${idx}" data-field="o_que" placeholder="O que será feito?">${escapeHtml(acao.o_que)}</textarea>
                        </div>
                    </div>
                    <div class="form-row cols-2">
                        <div class="form-group">
                            <label>Por Quê (Why)</label>
                            <textarea data-idx="${idx}" data-field="por_que" placeholder="Justificativa da ação">${escapeHtml(acao.por_que)}</textarea>
                        </div>
                        <div class="form-group">
                            <label>Onde (Where)</label>
                            <textarea data-idx="${idx}" data-field="onde" placeholder="Local de aplicação">${escapeHtml(acao.onde)}</textarea>
                        </div>
                    </div>
                    <div class="form-row cols-3">
                        <div class="form-group">
                            <label>Quem (Who)</label>
                            <input type="text" data-idx="${idx}" data-field="quem" value="${escapeHtml(acao.quem)}" placeholder="Responsável">
                        </div>
                        <div class="form-group">
                            <label>Quando (When)</label>
                            <input type="date" data-idx="${idx}" data-field="quando" value="${escapeHtml(acao.quando)}">
                        </div>
                        <div class="form-group">
                            <label>Quanto Custa (How Much)</label>
                            <input type="number" step="0.01" data-idx="${idx}" data-field="quanto_custa" value="${escapeHtml(acao.quanto_custa)}" placeholder="R$ 0,00">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Como (How)</label>
                            <textarea data-idx="${idx}" data-field="como" placeholder="Metodologia de execução">${escapeHtml(acao.como)}</textarea>
                        </div>
                    </div>
                    <div class="form-row cols-2">
                        <div class="form-group">
                            <label>Status</label>
                            <select data-idx="${idx}" data-field="status">
                                <option value="aberta" ${acao.status === 'aberta' ? 'selected' : ''}>Aberta</option>
                                <option value="em_progresso" ${acao.status === 'em_progresso' ? 'selected' : ''}>Em Progresso</option>
                                <option value="concluida" ${acao.status === 'concluida' ? 'selected' : ''}>Concluída</option>
                                <option value="cancelada" ${acao.status === 'cancelada' ? 'selected' : ''}>Cancelada</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Data de Conclusão</label>
                            <input type="date" data-idx="${idx}" data-field="data_conclusao" value="${escapeHtml(acao.data_conclusao)}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Evidência</label>
                            <textarea data-idx="${idx}" data-field="evidencia" placeholder="Evidência de execução da ação">${escapeHtml(acao.evidencia)}</textarea>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;

            container.querySelectorAll('input, textarea, select').forEach(el => {
                el.addEventListener('input', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    const field = e.target.dataset.field;
                    acoes[idx][field] = e.target.value;
                });
            });

            container.querySelectorAll('.btn-remove-acao').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    acoes.splice(idx, 1);
                    renderAcoes();
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function loadData() {
            const data = await loadStageData(STAGE_NUM);
            acoes = data?.acoes_5w2h || [];
            renderAcoes();
        }

        document.getElementById('btnAddAcao').addEventListener('click', () => {
            acoes.push({
                o_que: '', por_que: '', onde: '', quem: '', quando: '',
                como: '', quanto_custa: '', status: 'aberta', data_conclusao: '', evidencia: ''
            });
            renderAcoes();
        });

        document.getElementById('stageForm').addEventListener('submit', (e) => {
            e.preventDefault();
            saveStageData(STAGE_NUM, { acoes_5w2h: acoes });
            showAlert('✓ Etapa 14 salva com sucesso!', 'success');
        });

        renderStageNav(STAGE_NUM);
        renderProtocoloHeader('protocoloHeaderTag');
        loadData();
    </script>
</body>
</html>
