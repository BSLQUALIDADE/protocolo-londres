<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etapa 3 - Cronologia</title>
    <link rel="stylesheet" href="shared-styles.css">
    <link rel="stylesheet" href="extra-styles.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div>
                <div class="stage-info">Etapa 3 de 17</div>
                <div id="protocoloHeaderTag"></div>
                <div class="stage-title">⏰ Cronologia do Evento</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="goToList()">← Painel de Etapas</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="progress-bar-card">
            <div class="progress-info">
                <span class="progress-label">Progresso da Investigação</span>
                <span class="progress-percent">Etapa 3 de 17 (18%)</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:18%"></div></div>
        </div>

        <div class="form-card">
            <div class="form-card-header">
                <h2>📅 Linha do Tempo dos Acontecimentos</h2>
                <p>Registre, em ordem cronológica, cada ação relevante: identificação do evento, avaliações, intervenções e comunicações. A ordem é mantida pela sequência da tabela.</p>
            </div>

            <div class="alert" id="alert"></div>

            <form id="stageForm">
                <div class="form-section">
                    <div id="cronologiaTable"></div>
                    <button type="button" class="btn-add-row" id="btnAddRow">+ Adicionar Evento à Cronologia</button>
                </div>

                <div class="form-actions">
                    <div>
                        <button type="submit" class="btn-save">💾 Salvar Etapa</button>
                        <button type="button" class="btn-back-list" onclick="goToList()">Voltar ao Painel</button>
                    </div>
                    <div class="nav-stage-buttons" id="stageNav"></div>
                </div>
            </form>
        </div>
    </div>

    <script src="shared-components.js"></script>
    <script>
        const STAGE_NUM = 3;

        const columns = [
            { id: 'data', label: 'Data', type: 'date', width: '130px' },
            { id: 'hora', label: 'Hora', type: 'time', width: '100px' },
            { id: 'descricao', label: 'Descrição do Acontecimento', type: 'textarea' },
            { id: 'responsavel', label: 'Responsável', type: 'text', width: '160px' }
        ];

        let table;

        async function loadData() {
            const data = await loadStageData(STAGE_NUM);
            table = new DynamicTable('cronologiaTable', columns, data?.cronologia || []);
        }

        document.getElementById('btnAddRow').addEventListener('click', () => table.addRow());

        document.getElementById('stageForm').addEventListener('submit', (e) => {
            e.preventDefault();

            // Adiciona campo "ordem" automaticamente baseado na posição
            const rows = table.getData().map((row, idx) => ({ ...row, ordem: idx + 1 }));

            saveStageData(STAGE_NUM, { cronologia: rows });
            showAlert('✓ Etapa 3 salva com sucesso!', 'success');
        });

        if (!exigirAutenticacao()) { /* guard-stop */ } else {
        renderStageNav(STAGE_NUM);
        renderProtocoloHeader('protocoloHeaderTag');
        loadData();
        }
    </script>
</body>
</html>
