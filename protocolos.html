<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolos - Protocolo de Londres</title>
    <link rel="stylesheet" href="shared-styles.css">
    <link rel="stylesheet" href="extra-styles.css">
    <style>
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: 2px solid var(--color-border); background: white; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--color-text-secondary); transition: var(--transition); }
        .filter-btn.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div>
                <div class="stage-info">Protocolo de Londres</div>
                <div class="stage-title">📋 Todos os Protocolos</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="goToDashboard()">← Dashboard</button>
            </div>
        </div>
    </div>
    <div class="main-content">
        <div class="form-card">
            <div class="form-card-header">
                <h2>🗂️ Protocolos de Investigação</h2>
                <p>Lista de todos os protocolos abertos, em análise e encerrados.</p>
            </div>
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" data-filter="todos">Todos</button>
                <button class="filter-btn" data-filter="aberto">Em Andamento</button>
                <button class="filter-btn" data-filter="em_analise">Em Análise</button>
                <button class="filter-btn" data-filter="encerrado">Encerrados</button>
            </div>
            <div id="protocolosContainer"></div>
            <div class="form-actions" style="margin-top:20px;">
                <button class="btn-save" onclick="window.location.href='/novo-protocolo.html?novo=1'">+ Novo Protocolo</button>
            </div>
        </div>
    </div>
    <script src="shared-components.js"></script>
    <script>
        // Lê filtro da URL (?filtro=encerrado) ao chegar do dashboard
        const _urlFiltro = new URLSearchParams(window.location.search).get('filtro');
        let currentFilter = _urlFiltro || 'todos';
        // Ativa o botão correspondente ao filtro da URL
        document.addEventListener('DOMContentLoaded', () => {
            if (_urlFiltro) {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.filter === _urlFiltro);
                });
            }
        });
        const statusLabels = { rascunho: 'Rascunho', aberto: 'Aberto', em_analise: 'Em Análise', encerrado: 'Encerrado' };
        function formatDate(iso) {
            if (!iso) return '-';
            const d = new Date(iso);
            return d.toLocaleDateString('pt-BR');
        }
        function renderProtocolos() {
            const container = document.getElementById('protocolosContainer');
            let protocolos = listarProtocolosComNumero();
            if (currentFilter === 'aberto') {
                // "Abertos" mostra tanto aberto quanto em_analise
                protocolos = protocolos.filter(p => p.status === 'aberto' || p.status === 'em_analise');
            } else if (currentFilter !== 'todos') {
                protocolos = protocolos.filter(p => p.status === currentFilter);
            }
            if (protocolos.length === 0) {
                container.innerHTML = `<div class="empty-state">Nenhum protocolo encontrado${currentFilter !== 'todos' ? ' com este filtro' : ''}. ${currentFilter === 'todos' ? 'Crie um novo protocolo para começar.' : ''}</div>`;
                return;
            }
            let html = '';
            protocolos.forEach(p => {
                html += `
                <div class="protocolo-list-item">
                    <div class="protocolo-list-info">
                        <div class="protocolo-list-numero">${p.numero}</div>
                        <div class="protocolo-list-meta">
                            <span>👤 ${p.nome_residente || '-'}</span>
                            <span>📅 Aberto: ${formatDate(p.data_abertura)}</span>
                            ${p.data_encerramento ? `<span>✅ Encerrado: ${formatDate(p.data_encerramento)}</span>` : ''}
                            <span class="protocolo-status-badge status-${p.status}">${statusLabels[p.status]}</span>
                        </div>
                        ${(function() {
                            const etapas = calcularProgresso(p.uuid);
                            const pct = p.status === 'encerrado' ? 100 : Math.round(etapas / 16 * 100);
                            const dias = calcularDiasAberto(p.data_abertura, p.data_encerramento);
                            const diasTxt = p.data_encerramento ? (dias === 1 ? '1 dia aberto' : dias + ' dias aberto') : dias === 0 ? 'Aberto hoje' : dias === 1 ? '1 dia aberto' : dias + ' dias aberto';
                            const cor = pct === 100 ? '#00875A' : pct >= 50 ? '#D4A020' : '#1A6B7A';
                            const etapaTxt = p.status === 'encerrado' ? 'Concluído' : `Etapa ${etapas} de 16 concluídas`;
                            return `<div style="margin-top:8px;">
                                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                                    <span style="font-size:11px;color:#6B7280;">${etapaTxt}</span>
                                    <span style="font-size:11px;color:#6B7280;">🕐 ${diasTxt} · ${pct}%</span>
                                </div>
                                <div style="background:#E5E7EB;border-radius:99px;height:6px;overflow:hidden;">
                                    <div style="width:${pct}%;height:100%;background:${cor};border-radius:99px;transition:width 0.3s;"></div>
                                </div>
                            </div>`;
                        })()}
                    </div>
                    <div class="protocolo-list-actions">
                        <button class="btn-nav" onclick="abrirProtocolo('${p.uuid}')">Abrir</button>
                        <button class="btn-icon delete" onclick="confirmarExclusao('${p.uuid}', '${p.numero}')" title="Excluir">🗑️</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }
        function calcularProgresso(uuid) {
            let etapasConcluidas = 0;
            for (let i = 1; i <= 16; i++) {
                const chave = `protocolo:${uuid}:etapa-${i}-completa`;
                if (localStorage.getItem(chave) === 'true') etapasConcluidas++;
            }
            return etapasConcluidas;
        }

        function calcularDiasAberto(dataAbertura, dataEncerramento) {
            if (!dataAbertura) return 0;
            const inicio = new Date(dataAbertura);
            const fim = dataEncerramento ? new Date(dataEncerramento) : new Date();
            const diff = Math.floor((fim - inicio) / (1000 * 60 * 60 * 24));
            return diff;
        }

        function confirmarExclusao(uuid, numero) {
            if (confirm(`Tem certeza que deseja excluir o protocolo ${numero}? Esta ação não pode ser desfeita.`)) {
                excluirProtocolo(uuid);
                renderProtocolos();
                showAlert(`Protocolo ${numero} excluído.`, 'info');
            }
        }
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderProtocolos();
            });
        });
        renderProtocolos();
        window.addEventListener('protocolos-sincronizados', () => { renderProtocolos(); });

        // Separação por unidade — só mostra quando filtro é 'todos' ou 'aberto'
        function renderPorUnidade() {
            const secao = document.getElementById('secaoUnidades');
            if (!secao) return;
            if (currentFilter === 'encerrado') { secao.style.display = 'none'; return; }
            secao.style.display = 'block';

            const protocolos = listarProtocolosComNumero().filter(p =>
                p.status === 'aberto' || p.status === 'em_analise'
            );
            const porUnidade = {};
            protocolos.forEach(p => {
                const u = p.unidade || 'Unidade não informada';
                if (!porUnidade[u]) porUnidade[u] = [];
                porUnidade[u].push(p);
            });

            const grid = document.getElementById('unidadesGrid');
            if (!grid) return;
            if (Object.keys(porUnidade).length === 0) {
                grid.innerHTML = '<div style="text-align:center;color:#98a2b3;padding:20px;font-size:13px;">Nenhum protocolo em andamento.</div>';
                return;
            }

            const corUnidade = (u) => {
                if (u.includes('Cora') || u.includes('Vivace') || u.includes('Bem Viver')) return '#1A6B7A';
                if (u.includes('Sainte')) return '#6B3FA0';
                if (u.includes('AssistCare') || u.includes('Gaia')) return '#1A56A0';
                return '#5A5A5A';
            };
            const stCfg = {
                aberto: { bg: '#ebf2fb', fg: '#1A56A0', l: 'ABERTO' },
                em_analise: { bg: '#fdf6e3', fg: '#D4A020', l: 'EM ANÁLISE' },
            };

            let html = '';
            Object.entries(porUnidade).sort((a,b) => b[1].length - a[1].length).forEach(([unidade, protos]) => {
                const cor = corUnidade(unidade);
                const rows = protos.map(p => {
                    const st = stCfg[p.status] || stCfg.aberto;
                    const data = p.data_abertura ? new Date(p.data_abertura).toLocaleDateString('pt-BR') : '—';
                    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #f0f0f0;gap:8px;flex-wrap:wrap;">
                        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
                            <span style="font-size:13px;font-weight:700;color:#1a2332;white-space:nowrap;">${p.numero}</span>
                            <span style="font-size:12px;color:#667085;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.nome_residente || '—'}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
                            <span style="font-size:11px;color:#98a2b3;">${data}</span>
                            <span style="background:${st.bg};color:${st.fg};font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;">${st.l}</span>
                            <button onclick="abrirProtocolo('${p.uuid}')" style="padding:4px 12px;background:${cor};color:white;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;">Abrir</button>
                        </div>
                    </div>`;
                }).join('');

                html += `<div style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:12px;">
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:${cor}15;border-left:4px solid ${cor};">
                        <span style="font-size:14px;font-weight:700;color:${cor};">🏥 ${unidade}</span>
                        <span style="background:${cor};color:white;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;">${protos.length} protocolo${protos.length > 1 ? 's' : ''}</span>
                    </div>
                    ${rows}
                </div>`;
            });
            grid.innerHTML = html;
        }
        renderPorUnidade();
        window.addEventListener('protocolos-sincronizados', renderPorUnidade);
    </script>
    <div id="secaoUnidades" style="margin-top:28px;">
        <h3 style="font-size:15px;margin-bottom:16px;display:flex;align-items:center;gap:8px;">🏥 Em Andamento por Unidade</h3>
        <div id="unidadesGrid"></div>
    </div>
    <div class="alert" id="alert" style="position:fixed; bottom:20px; right:20px; max-width:360px; z-index:999;"></div>
</body>
</html>
